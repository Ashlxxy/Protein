<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Account - Buitenworks</title><link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700;800&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet"><link rel="stylesheet" href="styles.css"></head><body>
<nav class="site-nav">
  <div class="nav-inner">
    <a class="nav-left" href="index.html"><img src="assets/buitenworks-logo.png" class="logo" alt="Buitenworks"></a>
    <div class="nav-center">
      <a href="catalog.html">Catalog</a>
      <a href="community.html">Community</a>
      <a href="archives.html">Archives</a>
      <a href="about.html">About</a>
    </div>
    <div class="nav-right">
      <button class="lang-badge"><span class="flag"/> IDR</button>
      <button id="cartBtn" class="ghost">Cart</button>
      <button id="loginBtn" class="primary-outline">Login</button>
    </div>
  </div>
</nav>

<main class="container-main account-page">
  <h1>My Account</h1>
  <div class="account-panel">
    <div class="account-promo">Enjoy Special Discounts and Stay Connected
      <div class="account-actions"><button id="loginBtnTop" class="btn-outline">Login</button><a class="btn primary" href="login.html">Signup</a></div>
    </div>

    <div class="account-box">
      <div class="tabs">
        <button class="tab active" data-tab="orders">Orders</button>
        <button class="tab" data-tab="wishlist">Wishlist</button>
      </div>
      <div class="tab-content" id="orders">
        <h3>My Orders (0)</h3>
        <div class="empty">No Orders Found</div>
      </div>
      <div class="tab-content" id="wishlist" style="display:none">
        <h3>Wishlist</h3>
        <div class="empty">No wishlist yet.</div>
      </div>
    </div>
  </div>
</main>

<!-- login modal -->
<div class="modal" id="loginModal" aria-hidden="true">
  <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="loginTitle">
    <button class="modal-close" id="closeLogin" aria-label="close">✕</button>
    <h3 id="loginTitle">Login</h3>
    <form id="loginForm">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required>
      <button class="btn primary" type="submit">Login</button>
      <p class="muted">Or <a href="account.html">create an account</a></p>
    </form>
  </div>
</div>



<footer class="site-footer"><div class="footer-inner"><div class="payments">Payment Method</div><div class="copyright">© 2025 Buitenworks demo</div></div></footer>

<script src="scripts.js"></script>
</body></html>
